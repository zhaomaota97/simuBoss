name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack source
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='logs' \
            --exclude='outputs' \
            --exclude='backend/.venv' \
            --exclude='backend/generated_ppt' \
            --exclude='.env' \
            --exclude='.env.production' \
            -czf "$RUNNER_TEMP/simuboss-release.tgz" .
          cp "$RUNNER_TEMP/simuboss-release.tgz" simuboss-release.tgz

      - name: Build deployment images
        run: |
          docker build --target backend -t simuboss-backend:latest .
          docker build --target web -t simuboss-web:latest .
          docker pull postgres:16-alpine
          docker save simuboss-backend:latest simuboss-web:latest postgres:16-alpine | gzip > simuboss-images.tar.gz

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          source: "simuboss-release.tgz,simuboss-images.tar.gz"
          target: /tmp

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -e
            APP_DIR=/opt/simuboss
            mkdir -p "$APP_DIR"
            find "$APP_DIR" -mindepth 1 \
              ! -name '.env.production' \
              ! -name 'backend' \
              -exec rm -rf {} +
            if [ -d "$APP_DIR/backend" ]; then
              find "$APP_DIR/backend" -mindepth 1 \
                ! -name 'generated_ppt' \
                ! -name 'simuboss.db' \
                -exec rm -rf {} +
            fi
            tar -xzf /tmp/simuboss-release.tgz -C "$APP_DIR"
            rm -f /tmp/simuboss-release.tgz
            docker load -i /tmp/simuboss-images.tar.gz
            rm -f /tmp/simuboss-images.tar.gz
            cd "$APP_DIR"
            SKIP_GIT_PULL=1 SKIP_BUILD=1 bash scripts/deploy-ecs.sh
